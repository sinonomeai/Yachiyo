<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yiruha</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #fff;
      }
      .container {
        width: 880px;
        background-color: #1e1e2e;
        color: #e0e0ec;
        border: 1px solid #282840;
        border-radius: 12px;
      }
      .father {
        width: 100%;
        height: 60px;
      }
      .textarea {
        width: 100%;
        height: inherit;
        background-color: transparent;
        color: #e0e0ec;
        border: none;
        outline: none;
        resize: none;
        font-size: 18px;
        padding: 12px 12px 0 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="father">
        <textarea
          class="textarea"
          aria-label="输入消息"
          placeholder="与yachiyo建立链接"
          rows="2"></textarea>
      </div>
      <div style="height: 58px; padding: 16px">111</div>
    </div>
  </body>
  <script>
    const father = document.querySelector(".father");
    const textarea = document.querySelector(".textarea");
    textarea.addEventListener("input", () => {
      textarea.style.height = "auto";
     if(textarea.scrollHeight < 300){
      father.style.height = textarea.scrollHeight + "px";
      textarea.style.height = "inherit";
     }else{
      father.style.height = "300px";
      textarea.style.height = "inherit";
     }
    });
  </script>
</html>
