<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yiruha</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #fff;
      }
      div {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 400px;
        height: 600px;
        background-color: aqua;
        overflow: hidden;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        max-width: none;
        transform-origin: 60% 30px;
        transition: transform 0.5s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <img id="floatImg" src="yachiyo/public/yiruha.jpg" alt="yiruha" />
    </div>
    <script>
      const container = document.getElementById("container");
      const img = document.getElementById("floatImg");

      let targetX = 0,
        targetY = 0;
      let currentX = 0,
        currentY = 0;
      let velX = 0,
        velY = 0;
      let hovering = false;

      container.addEventListener("mousemove", (e) => {
        const rect = container.getBoundingClientRect();
        targetX = (e.clientX - rect.left) / rect.width - 0.5;
        targetY = (e.clientY - rect.top) / rect.height - 0.5;
        hovering = true;
      });

      container.addEventListener("mouseleave", () => {
        hovering = false;
        targetX = 0;
        targetY = 0;
      });

      function animate() {
        const maxOffset = 100;
        const friction = 0.92;
        const attract = 0.08;

        if (hovering) {
          velX += (targetX - currentX) * attract;
          velY += (targetY - currentY) * attract;
        } else {
          velX += (0 - currentX) * attract;
          velY += (0 - currentY) * attract;
        }

        velX *= friction;
        velY *= friction;

        currentX += velX;
        currentY += velY;

        const tx = currentX * maxOffset;
        const ty = currentY * maxOffset;
        const scale = hovering ? 1.6 : 1;

        img.style.transform = `scale(${scale}) translate(${tx}px, ${ty}px)`;

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    </script>
  </body>
</html>
